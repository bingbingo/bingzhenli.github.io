{% assign projects = site.data.projects %}

<section class="section-pad section-alt" id="projects">
  <div class="container">
    <div class="section-heading">
      <p class="section-kicker">Featured Work</p>
      <h2>Projects</h2>
    </div>

    <div class="card-grid">
      {% for project in projects %}
      <article class="info-card">
        <div class="card-label">{{ project.category }}</div>
        <h3>{{ project.title }}</h3>
        <p>{{ project.description }}</p>
        {% if project.link %}
        <p>
          <a href="{{ project.link }}" target="_blank" rel="noreferrer"
            >Project link</a
          >
        </p>
        {% endif %}
      </article>
      {% endfor %}
    </div>
  </div>
</section>
